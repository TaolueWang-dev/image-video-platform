<!DOCTYPE html>

<html lang="zh"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Astral Forge - 视频生成</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "colors": {

                        "on-primary": "#ffffff",
                        "on-background": "#0b1c30",
                        "surface": "#f8f9ff",

                        "on-primary-fixed-variant": "#004395",
                        "error": "#ba1a1a",
                        "on-secondary-fixed-variant": "#444749",
                        "tertiary": "#4648d4",
                        "on-primary-container": "#fefcff",
                        "tertiary-container": "#6063ee",
                        "outline": "#727785",
                        "on-tertiary-fixed-variant": "#2f2ebe",
                        "surface-container-low": "#eff4ff",
                        "primary-fixed": "#d8e2ff",
                        "tertiary-fixed": "#e1e0ff",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#213145",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#2170e4",
                        "on-surface": "#0b1c30",
                        "inverse-on-surface": "#eaf1ff",

                        "outline-variant": "#c2c6d6",
                        "surface-tint": "#005ac2",

                        "on-secondary-fixed": "#191c1e",
                        "on-surface-variant": "#424754",

                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#001a42",
                        "secondary-fixed-dim": "#c4c7c9",
                        "surface-container-high": "#dce9ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "sm": "12px",
                        "gutter": "24px",
                        "xl": "80px",
                        "lg": "48px",
                        "base": "8px",
                        "md": "24px",
                        "container-max": "1280px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "h1": ["Plus Jakarta Sans"],
                        "display": ["Plus Jakarta Sans"],
                        "label-sm": ["Inter"],
                        "h2": ["Plus Jakarta Sans"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "h1": ["32px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "display": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-sm": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.01em", "fontWeight": "500"}],

                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}]

                }
            }
        }

<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-h1, .font-h2, .font-display { font-family: 'Plus Jakarta Sans', sans-serif; }
        .soft-blue-panel { background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(239,244,255,0.96) 100%); border: 1px solid rgba(173,198,255,0.42); box-shadow: 0 18px 40px -24px rgba(0, 88, 190, 0.28); }
        .soft-blue-subtle { background: linear-gradient(180deg, rgba(248,249,255,0.98) 0%, rgba(229,238,255,0.92) 100%); border: 1px solid rgba(194,198,214,0.65); }
</style>
<link href="/styles.css" rel="stylesheet"/>
</head>
<body class="bg-background text-on-background antialiased min-h-screen flex" data-page="video">
<!-- SideNavBar -->
<nav class="h-screen w-64 fixed left-0 top-0 rounded-r-xl shadow-sm bg-surface-bright shadow-[0_10_30px_-5px_rgba(0,0,0,0.04)] z-50 flex flex-col gap-sm p-sm">
<div class="px-4 py-6 mb-4 flex items-center gap-sm">
<div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<div>
<h1 class="font-h2 text-h2 font-bold text-primary tracking-tight">Astral Forge</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant">gpt-image-2和seeddance2.0创作平台</p>
</div>
</div>
<div class="flex-1 flex flex-col gap-1">
<a class="nav-link text-on-surface-variant flex items-center px-4 py-3 hover:bg-surface-container-high transition-all duration-300 rounded-xl scale-98 transition-transform duration-200" data-nav="home" href="/">
<span class="material-symbols-outlined mr-3">home</span>
<span class="font-label-sm text-label-sm">首页</span>
</a>
<a class="nav-link text-on-surface-variant flex items-center px-4 py-3 hover:bg-surface-container-high transition-all duration-300 rounded-xl scale-98 transition-transform duration-200" data-nav="image" href="/image">
<span class="material-symbols-outlined mr-3">image</span>
<span class="font-label-sm text-label-sm">图片生成</span>
</a>
<a class="nav-link bg-primary-container text-on-primary-container rounded-xl font-bold flex items-center px-4 py-3 scale-98 transition-transform duration-200 shadow-sm" data-nav="video" href="/video">
<span class="material-symbols-outlined mr-3" style="font-variation-settings: 'FILL' 1;">movie</span>
<span class="font-label-sm text-label-sm">视频生成</span>
</a>
<a class="nav-link text-on-surface-variant flex items-center px-4 py-3 hover:bg-surface-container-high transition-all duration-300 rounded-xl scale-98 transition-transform duration-200" data-nav="recharge" href="/recharge">
<span class="material-symbols-outlined mr-3">payments</span>
<span class="font-label-sm text-label-sm">账单中心</span>
</a>
<a class="nav-link text-on-surface-variant flex items-center px-4 py-3 hover:bg-surface-container-high transition-all duration-300 rounded-xl scale-98 transition-transform duration-200" data-nav="profile" href="/profile">
<span class="material-symbols-outlined mr-3">account_circle</span>
<span class="font-label-sm text-label-sm">个人中心</span>
</a>
<a class="nav-link text-on-surface-variant flex items-center px-4 py-3 hover:bg-surface-container-high transition-all duration-300 rounded-xl scale-98 transition-transform duration-200" data-nav="admin" href="/admin">
<span class="material-symbols-outlined mr-3">shield_person</span>
<span class="font-label-sm text-label-sm">后台入口</span>
</a>
</div>
<!-- User Profile Area -->
<div class="mt-auto pt-4 border-t border-outline-variant/20" id="workspace-sidebar-slot">
<div class="flex items-start gap-3 px-4 py-2 rounded-xl bg-white/70 border border-white/70 shadow-[0_18px_32px_-24px_rgba(15,23,42,0.22)]">
<div class="w-10 h-10 rounded-2xl bg-sky-100 text-sky-700 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-[20px]">account_circle</span>
</div>
<div class="flex-1 min-w-0">
<p class="font-label-sm text-label-sm font-medium text-on-surface truncate" id="workspace-sidebar-title">未登录</p>
<p class="text-xs text-on-surface-variant truncate" id="workspace-sidebar-subtitle">登录后可查看工作台与后台入口</p>
<div class="mt-3 flex flex-wrap gap-2" id="workspace-sidebar-links"></div>
</div>
</div>
</div>
</nav>
<main class="ml-64 h-screen flex w-[calc(100%-16rem)] bg-gradient-to-br from-background via-surface to-surface-container pb-4">
<aside class="w-80 shrink-0 bg-[linear-gradient(180deg,rgba(239,246,255,0.96)_0%,rgba(248,250,252,0.98)_100%)] border-r border-sky-100 flex flex-col shadow-[0_18px_40px_-24px_rgba(0,88,190,0.18)] z-10 min-h-0">
<div class="p-gutter pb-4 flex-1 min-h-0 overflow-y-auto">
<div class="flex items-center justify-between mb-6">
<h2 class="font-h2 text-body-lg font-semibold text-on-surface">最近生成</h2>
<button class="w-9 h-9 rounded-full bg-sky-100 hover:bg-sky-200 text-sky-700 hover:text-sky-800 flex items-center justify-center transition-colors" id="video-session-new" type="button">
<span class="material-symbols-outlined text-[20px]">add</span>
</button>
</div>
<div class="space-y-3">
<select class="hidden" id="video-session-select"></select>
<div class="flex gap-2">
<button class="flex-1 rounded-xl border border-sky-100 bg-white px-3 py-2 text-sm text-slate-600 transition-colors hover:bg-sky-50" id="video-session-rename" type="button">重命名</button>
<button class="flex-1 rounded-xl border border-sky-100 bg-white px-3 py-2 text-sm text-rose-500 transition-colors hover:bg-rose-50" id="video-session-delete" type="button">删除</button>
</div>
<p class="text-xs text-slate-500" id="video-session-meta">暂无对话</p>
</div>
<div class="space-y-2 pb-4" id="video-session-list"></div>
</div>
</aside>
<section class="flex-1 min-w-0 flex flex-col bg-transparent image-conversation-stage pl-6 pt-5 lg:pl-8 lg:pt-6">
<form class="flex-1 min-h-0 flex flex-col" id="video-form">
<div class="flex-1 overflow-y-auto p-6 pt-0 lg:p-8 lg:pt-0 pb-20 pl-8 lg:pl-10 space-y-xl" id="video-thread"></div>
<input accept="image/*" class="hidden" id="video-attachment-input" multiple="" type="file"/>
<div class="sticky bottom-0 z-20 w-full px-6 pb-6 pt-4 flex justify-center bg-[linear-gradient(180deg,rgba(248,249,255,0)_0%,rgba(248,249,255,0.92)_22%,rgba(248,249,255,0.98)_100%)] border-t border-sky-100/80 backdrop-blur-sm">
<div class="max-w-3xl w-full bg-[linear-gradient(180deg,rgba(239,246,255,0.95)_0%,rgba(255,255,255,0.98)_100%)] backdrop-blur-2xl rounded-[24px] shadow-[0_20px_40px_-24px_rgba(0,88,190,0.2)] p-3 flex flex-col gap-2 border border-sky-100">
<div class="flex flex-wrap gap-2">
<button class="inline-flex items-center gap-2 rounded-full border border-sky-100 bg-white px-3 py-2 text-sm text-slate-700 transition-colors hover:bg-sky-50" data-video-upload-role="reference_image" id="video-attachment-trigger" type="button">
<span class="material-symbols-outlined text-primary text-[18px]">image_search</span>@图片参考
</button>
<button class="inline-flex items-center gap-2 rounded-full border border-sky-100 bg-white px-3 py-2 text-sm text-slate-700 transition-colors hover:bg-sky-50" data-video-upload-role="first_frame" type="button">
<span class="material-symbols-outlined text-primary text-[18px]">video_camera_front</span>首帧
</button>
<button class="inline-flex items-center gap-2 rounded-full border border-sky-100 bg-white px-3 py-2 text-sm text-slate-700 transition-colors hover:bg-sky-50" data-video-upload-role="last_frame" type="button">
<span class="material-symbols-outlined text-primary text-[18px]">flag</span>尾帧
</button>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-3">
<div class="flex flex-col gap-sm">
<span class="px-1 font-label-sm text-label-sm text-on-surface-variant">生成时长</span>
<input name="duration" type="hidden" value="4"/>
<div class="flex bg-surface-container-low rounded-lg p-1">
<button class="flex-1 py-2 px-4 rounded-md font-label-sm text-label-sm text-on-surface bg-surface-container-lowest shadow-sm" type="button">4s</button>
<button class="flex-1 py-2 px-4 rounded-md font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface transition-colors" type="button">8s</button>
</div>
</div>
<div class="flex flex-col gap-sm">
<span class="px-1 font-label-sm text-label-sm text-on-surface-variant">分辨率</span>
<input name="resolution" type="hidden" value="1080p"/>
<div class="flex bg-surface-container-low rounded-lg p-1">
<button class="flex-1 py-2 px-4 rounded-md font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface transition-colors" type="button">720p</button>
<button class="flex-1 py-2 px-4 rounded-md font-label-sm text-label-sm text-on-surface bg-surface-container-lowest shadow-sm" type="button">1080p</button>
</div>
</div>
<div class="flex flex-col gap-sm">
<span class="px-1 font-label-sm text-label-sm text-on-surface-variant">画面比例</span>
<input name="aspectRatio" type="hidden" value="16:9"/>
<div class="flex bg-surface-container-low rounded-lg p-1">
<button class="flex-1 py-2 rounded-md font-label-sm text-label-sm text-on-surface bg-surface-container-lowest shadow-sm" type="button">
<span class="material-symbols-outlined text-sm">crop_16_9</span>
</button>
<button class="flex-1 py-2 rounded-md font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-sm">crop_portrait</span>
</button>
<button class="flex-1 py-2 rounded-md font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-sm">crop_square</span>
</button>
</div>
</div>
</div>
<div class="mb-1" id="video-attachment-panel"></div>
<div class="px-2 text-xs text-slate-500" id="video-composer-hint">`@图片` 模式适合多张参考图；首尾帧模式更适合控制镜头起止。视频结果会继续追加在上面的对话流中。</div>
<div class="relative">
<div class="video-mention-menu is-hidden" id="video-mention-menu"></div>
<div class="flex items-end gap-2 rounded-2xl border border-sky-100 bg-white/90 px-2 shadow-[inset_0_1px_0_rgba(255,255,255,0.8)]">
<button class="p-3 text-sky-600 hover:text-sky-700 transition-colors flex-shrink-0" data-video-upload-role="reference_image" type="button">
<span class="material-symbols-outlined">attachment</span>
</button>
<textarea class="w-full bg-transparent border-none focus:ring-0 resize-none max-h-32 min-h-[44px] py-3 font-body-md text-body-md text-slate-700 placeholder:text-slate-400" name="prompt" placeholder="描述您想要生成的视频，例如：镜头从 @图片1 的构图慢慢推进，并在尾声过渡到 @图片2 的颜色氛围..." rows="1"></textarea>
<button class="bg-sky-600 hover:bg-sky-700 text-white px-6 py-3 rounded-2xl font-label-sm text-label-sm font-semibold shadow-sm hover:shadow-md transition-all flex items-center gap-2 flex-shrink-0 h-11" type="submit">
生成
<span class="material-symbols-outlined text-[18px]">magic_button</span>
</button>
</div>
</div>
<div class="px-2 text-xs text-slate-500 flex items-center gap-3">
<span id="video-status">待命</span>
<span id="video-message">准备就绪，可直接描述镜头或结合附件模式生成视频。</span>
</div>
</div>
</div>
</form>
</section>
</main>
<script defer src="/app.js"></script>
</body></html>
