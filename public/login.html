<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 / Image Video Platform</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link href="/styles.css" rel="stylesheet" />
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(96,165,250,0.16),_transparent_35%),linear-gradient(180deg,_#f8fbff_0%,_#eef4ff_100%)] font-['Inter'] text-slate-900" data-page="login">
  <main class="mx-auto flex min-h-screen max-w-6xl flex-col justify-center gap-10 px-6 py-10 lg:flex-row lg:items-center">
    <section class="max-w-xl">
      <p class="text-sm uppercase tracking-[0.28em] text-sky-600">Workspace Access</p>
      <h1 class="mt-4 font-['Plus_Jakarta_Sans'] text-4xl font-bold tracking-tight text-slate-950 sm:text-5xl">登录、注册、邮箱认证</h1>
      <p class="mt-4 text-lg leading-8 text-slate-600">普通用户注册后需要先完成邮箱验证码认证，之后可用密码或邮箱验证码登录；管理员保留邮箱验证码登录。登录成功后会返回你原本要访问的页面。</p>
      <div class="mt-8 grid gap-4 sm:grid-cols-2">
        <article class="rounded-[24px] border border-white/70 bg-white/80 p-5 shadow-[0_24px_60px_-32px_rgba(15,23,42,0.28)] backdrop-blur">
          <span class="material-symbols-outlined text-sky-600">person_add</span>
          <h2 class="mt-3 text-lg font-semibold">公开注册</h2>
          <p class="mt-2 text-sm text-slate-600">新用户可直接创建账号并设置密码，注册后先验证邮箱再激活账号。</p>
        </article>
        <article class="rounded-[24px] border border-white/70 bg-white/80 p-5 shadow-[0_24px_60px_-32px_rgba(15,23,42,0.28)] backdrop-blur">
          <span class="material-symbols-outlined text-sky-600">admin_panel_settings</span>
          <h2 class="mt-3 text-lg font-semibold">管理员入口</h2>
          <p class="mt-2 text-sm text-slate-600">管理员继续使用邮箱验证码登录，避免把后台权限暴露成公共注册入口。</p>
        </article>
      </div>
    </section>

    <section class="w-full max-w-md">
      <form class="rounded-[32px] border border-white/70 bg-white/88 p-6 shadow-[0_30px_80px_-36px_rgba(15,23,42,0.3)] backdrop-blur sm:p-8" id="login-form">
        <div class="flex items-center justify-between gap-3">
          <div>
            <p class="text-sm uppercase tracking-[0.24em] text-slate-400">Access Modes</p>
            <h2 class="mt-2 font-['Plus_Jakarta_Sans'] text-2xl font-bold text-slate-950">进入工作台</h2>
          </div>
          <div class="rounded-full bg-sky-100 px-3 py-2 text-xs font-semibold text-sky-700" id="login-mode-badge">密码登录</div>
        </div>

        <div class="mt-8 grid grid-cols-3 gap-2 rounded-2xl bg-slate-100 p-1">
          <button class="rounded-2xl px-3 py-3 text-sm font-semibold text-slate-600 transition" data-auth-mode="password" id="auth-mode-password" type="button">密码登录</button>
          <button class="rounded-2xl px-3 py-3 text-sm font-semibold text-slate-600 transition" data-auth-mode="register" id="auth-mode-register" type="button">注册账号</button>
          <button class="rounded-2xl px-3 py-3 text-sm font-semibold text-slate-600 transition" data-auth-mode="code" id="auth-mode-code" type="button">验证码</button>
        </div>

        <label class="mt-8 block text-sm font-medium text-slate-700" for="login-email">邮箱</label>
        <input class="mt-2 w-full rounded-2xl border-slate-200 bg-slate-50 px-4 py-3 text-base" id="login-email" name="email" placeholder="you@example.com" type="email" />

        <div id="login-password-panel">
          <label class="mt-5 block text-sm font-medium text-slate-700" for="login-password">密码</label>
          <input class="mt-2 w-full rounded-2xl border-slate-200 bg-slate-50 px-4 py-3 text-base" id="login-password" name="password" placeholder="至少 8 位密码" type="password" />
        </div>

        <div id="login-subject-panel" class="hidden">
          <label class="mt-5 block text-sm font-medium text-slate-700" for="login-subject-type">登录身份</label>
          <select class="mt-2 w-full rounded-2xl border-slate-200 bg-slate-50 px-4 py-3 text-base" id="login-subject-type" name="subjectType">
            <option value="user">普通用户</option>
            <option value="admin">管理员</option>
          </select>
        </div>

        <div class="mt-6 hidden" id="login-code-step">
          <label class="block text-sm font-medium text-slate-700" for="login-code">验证码</label>
          <input class="mt-2 w-full rounded-2xl border-slate-200 bg-slate-50 px-4 py-3 text-base tracking-[0.3em]" id="login-code" inputmode="numeric" name="code" placeholder="输入验证码" />
        </div>

        <div class="mt-6 flex gap-3">
          <button class="hidden flex-1 items-center justify-center rounded-2xl bg-sky-600 px-4 py-3 text-base font-semibold text-white transition hover:bg-sky-700" id="login-request-code" type="button">发送验证码</button>
          <button class="inline-flex flex-1 items-center justify-center rounded-2xl bg-slate-950 px-4 py-3 text-base font-semibold text-white transition hover:bg-slate-800" id="login-submit" type="submit">登录</button>
        </div>

        <p class="mt-5 text-sm text-slate-500" id="login-mode-help">使用邮箱和密码直接登录普通用户工作台。</p>
        <p class="mt-2 min-h-[24px] text-sm text-slate-600" id="login-message">请输入邮箱和密码。</p>
        <p class="min-h-[24px] text-sm text-emerald-600" id="login-dev-hint"></p>
      </form>
    </section>
  </main>
  <script defer src="/app.js"></script>
</body>
</html>
