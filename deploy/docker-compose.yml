services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: image-video-platform:latest
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    volumes:
      - app_data:/app/data
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  app_data:
